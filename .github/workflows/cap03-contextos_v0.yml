# Solución de referencia del capítulo 02.
# Copia a .github/workflows/cap02-acciones.yml
name: cap03 · Expresiones, contextos, variables y secretos

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP: demo-build  # Variable de entorno a nivel de job
      TEST_REPOSITORY_SECRET: ${{ secrets.TEST_REPOSITORY_SECRET }}
      MY_REPO_VARIABLE: ${{ vars.MY_REPO_VARIABLE }}

    steps:
      
      - name: Imprimir el valor de la variable de entorno
        run: echo "${{ env.APP }}" # como expresión
      - id: calc
        name: Calcular un resultado
        run: echo "resultado=42" >> "$GITHUB_OUTPUT"
      - name: Imprimir el resultado
        run: echo "El resultado fue ${{ steps.calc.outputs.resultado }}"
      - name: Imprimir el secreto del repositorio
        run: echo "El secreto del repositorio es ${{ env.TEST_REPOSITORY_SECRET }}"
      - name: Imprimir la variable del repositorio
        run: echo "La variable del repositorio es ${{ env.MY_REPO_VARIABLE }}"