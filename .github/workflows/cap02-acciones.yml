# Solución de referencia del capítulo 01.
# Copia a .github/workflows/cap01-anatomia.yml
name: Usar acciones del Marketplace

on:
  push:


jobs:  
  usar-marketplace:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Usar el runtime instalado
        run: |
          python --version
          python -c "print('Hola desde Python en el runner')"