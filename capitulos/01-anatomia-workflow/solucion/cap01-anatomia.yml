# Solución de referencia del capítulo 01.
# Copia a .github/workflows/cap01-anatomia.yml
name: cap01 · Anatomía

on:
  push:
  pull_request:

jobs:
  inspeccionar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Listar archivos y mostrar entorno
        run: |
          echo "Rama: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          ls -la

  reportar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Contar archivos del repo
        run: |
          total=$(find . -type f | wc -l)
          echo "El repositorio tiene $total archivos."
